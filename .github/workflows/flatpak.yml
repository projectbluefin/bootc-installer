name: Flatpak

on:
  push:
    branches: [prod, dev]
    tags: ["v*"]
  pull_request:
    branches: [prod, dev]
  merge_group:

jobs:
  production:
    name: Build (production)
    if: >-
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: org.bootcinstaller.Installer.flatpak
          manifest-path: flatpak/org.bootcinstaller.Installer.json
          cache-key: flatpak-builder-production-${{ github.sha }}

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: org.bootcinstaller.Installer.flatpak
          path: org.bootcinstaller.Installer.flatpak
          retention-days: 30

      - name: Delete existing latest-stable release (prod branch)
        if: github.ref == 'refs/heads/prod'
        run: |
          gh release delete latest-stable --yes --cleanup-tag 2>&1 || true
          git push origin :refs/tags/latest-stable 2>&1 || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish stable pre-release (prod branch)
        if: github.ref == 'refs/heads/prod'
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          gh release create latest-stable \
            --title "Continuous Build" \
            --prerelease \
            --notes "Latest build from the \`prod\` branch. Updated automatically on every push." \
            org.bootcinstaller.Installer.flatpak
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Attach bundle to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: tagged-org.bootcinstaller.Installer.flatpak
          path: org.bootcinstaller.Installer.flatpak
          retention-days: 1

  devel:
    name: Build (devel)
    if: >-
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: org.bootcinstaller.Installer.Devel.flatpak
          manifest-path: flatpak/org.bootcinstaller.Installer.Devel.json
          cache-key: flatpak-builder-devel-${{ github.sha }}

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: org.bootcinstaller.Installer.Devel.flatpak
          path: org.bootcinstaller.Installer.Devel.flatpak
          retention-days: 30

      - name: Delete existing latest-dev release (dev branch)
        if: github.ref == 'refs/heads/dev'
        run: |
          gh release delete latest-dev --yes --cleanup-tag 2>&1 || true
          git push origin :refs/tags/latest-dev 2>&1 || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish dev pre-release (dev branch)
        if: github.ref == 'refs/heads/dev'
        run: |
          gh release create latest-dev \
            --title "Dev Build" \
            --prerelease \
            --notes "Latest build from the \`dev\` branch. May be unstable." \
            org.bootcinstaller.Installer.Devel.flatpak
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload devel bundle for tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: tagged-org.bootcinstaller.Installer.Devel.flatpak
          path: org.bootcinstaller.Installer.Devel.flatpak
          retention-days: 1

  publish-tagged-release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [production, devel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download production bundle
        uses: actions/download-artifact@v4
        with:
          name: tagged-org.bootcinstaller.Installer.flatpak

      - name: Download devel bundle
        uses: actions/download-artifact@v4
        with:
          name: tagged-org.bootcinstaller.Installer.Devel.flatpak

      - name: Create and publish release
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "bootc-installer ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            org.bootcinstaller.Installer.flatpak \
            org.bootcinstaller.Installer.Devel.flatpak
        env:
          GH_TOKEN: ${{ github.token }}
