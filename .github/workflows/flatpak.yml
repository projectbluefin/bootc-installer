name: Flatpak

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  flatpak:
    name: Build (${{ matrix.variant }})
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    strategy:
      matrix:
        include:
          - variant: production
            app-id: org.bootcinstaller.Installer
            manifest: flatpak/org.bootcinstaller.Installer.json
            bundle: org.bootcinstaller.Installer.flatpak
          - variant: debug
            app-id: org.bootcinstaller.Installer.Devel
            manifest: flatpak/org.bootcinstaller.Installer.Devel.json
            bundle: org.bootcinstaller.Installer.Devel.flatpak

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ${{ matrix.bundle }}
          manifest-path: ${{ matrix.manifest }}
          cache-key: flatpak-builder-${{ matrix.variant }}-${{ github.sha }}

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bundle }}
          path: ${{ matrix.bundle }}
          retention-days: 30

      - name: Publish continuous pre-release (main branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous Build
          prerelease: true
          body: "Latest build from the `main` branch. Updated automatically on every push."
          files: ${{ matrix.bundle }}

      - name: Attach bundle to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.bundle }}
