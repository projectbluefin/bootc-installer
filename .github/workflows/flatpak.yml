name: Flatpak

on:
  push:
    branches: [prod, dev]
    tags: ["v*"]
  pull_request:
    branches: [prod, dev]
  merge_group:

jobs:
  production:
    name: Build (production)
    if: >-
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: org.bootcinstaller.Installer.flatpak
          manifest-path: flatpak/org.bootcinstaller.Installer.json
          cache-key: flatpak-builder-production-${{ github.sha }}

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: org.bootcinstaller.Installer.flatpak
          path: org.bootcinstaller.Installer.flatpak
          retention-days: 30

      - name: Attach stable asset to latest versioned release (prod branch)
        if: github.ref == 'refs/heads/prod'
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # The stable channel uses GitHub's /releases/latest/download/ redirect,
          # which auto-resolves to the newest non-prerelease versioned tag.
          # We no longer maintain a rolling 'latest-stable' tag — its name is
          # permanently banned by a GitHub ruleset after an immutable release.
          # The versioned tag release already has the asset attached by the
          # 'Attach bundle to tagged release' step below; nothing to do here.
          echo "Stable channel served via releases/latest/download/ → $(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName')"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Attach bundle to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: tagged-org.bootcinstaller.Installer.flatpak
          path: org.bootcinstaller.Installer.flatpak
          retention-days: 1

  devel:
    name: Build (devel)
    if: >-
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: org.bootcinstaller.Installer.Devel.flatpak
          manifest-path: flatpak/org.bootcinstaller.Installer.Devel.json
          cache-key: flatpak-builder-devel-${{ github.sha }}

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: org.bootcinstaller.Installer.Devel.flatpak
          path: org.bootcinstaller.Installer.Devel.flatpak
          retention-days: 30

      - name: Delete existing latest-dev release (dev branch)
        if: github.ref == 'refs/heads/dev'
        run: |
          gh release delete latest-dev --yes --cleanup-tag 2>&1 || true
          git push origin :refs/tags/latest-dev 2>&1 || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish dev pre-release (dev branch)
        if: github.ref == 'refs/heads/dev'
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if gh release create latest-dev \
              --title "Dev Build" \
              --prerelease \
              --notes "Latest build from the \`dev\` branch. May be unstable." \
              org.bootcinstaller.Installer.Devel.flatpak 2>/dev/null; then
            echo "Release created"
          else
            gh release view latest-dev --json assets --jq '.assets[].name' | \
              xargs -I{} gh release delete-asset latest-dev {} --yes 2>/dev/null || true
            gh release upload latest-dev org.bootcinstaller.Installer.Devel.flatpak --clobber
            echo "Release assets updated"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload devel bundle for tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: tagged-org.bootcinstaller.Installer.Devel.flatpak
          path: org.bootcinstaller.Installer.Devel.flatpak
          retention-days: 1

  publish-tagged-release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [production, devel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download production bundle
        uses: actions/download-artifact@v4
        with:
          name: tagged-org.bootcinstaller.Installer.flatpak

      - name: Download devel bundle
        uses: actions/download-artifact@v4
        with:
          name: tagged-org.bootcinstaller.Installer.Devel.flatpak

      - name: Create and publish release
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "bootc-installer ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            org.bootcinstaller.Installer.flatpak \
            org.bootcinstaller.Installer.Devel.flatpak
        env:
          GH_TOKEN: ${{ github.token }}
