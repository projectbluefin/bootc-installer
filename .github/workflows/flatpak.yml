name: Flatpak

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]

jobs:
  production:
    name: Build (production)
    if: >-
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: org.bootcinstaller.Installer.flatpak
          manifest-path: flatpak/org.bootcinstaller.Installer.json
          cache-key: flatpak-builder-production-${{ github.sha }}

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: org.bootcinstaller.Installer.flatpak
          path: org.bootcinstaller.Installer.flatpak
          retention-days: 30

      - name: Publish continuous pre-release (main branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous Build
          prerelease: true
          body: "Latest build from the `main` branch. Updated automatically on every push."
          files: org.bootcinstaller.Installer.flatpak

      - name: Attach bundle to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: org.bootcinstaller.Installer.flatpak

  devel:
    name: Build (devel)
    if: >-
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: org.bootcinstaller.Installer.Devel.flatpak
          manifest-path: flatpak/org.bootcinstaller.Installer.Devel.json
          cache-key: flatpak-builder-devel-${{ github.sha }}

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: org.bootcinstaller.Installer.Devel.flatpak
          path: org.bootcinstaller.Installer.Devel.flatpak
          retention-days: 30

      - name: Publish dev pre-release (dev branch)
        if: github.ref == 'refs/heads/dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous-dev
          name: Dev Build
          prerelease: true
          body: "Latest build from the `dev` branch. May be unstable."
          files: org.bootcinstaller.Installer.Devel.flatpak

      - name: Attach bundle to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: org.bootcinstaller.Installer.Devel.flatpak
