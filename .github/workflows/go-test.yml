name: Go Tests

on:
  push:
    branches: [prod, dev]
  pull_request:
    branches: [prod, dev]
  merge_group:
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fisherman/fisherman

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: fisherman/fisherman/go.sum

      - name: go vet
        run: go vet ./...

      - name: Run tests with coverage
        run: |
          go test -v -count=1 -timeout=60s -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1

      - name: Check coverage threshold
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/total:/ {gsub("%",""); print $NF}')
          echo "Coverage: ${pct}%"
          if awk "BEGIN {exit !(${pct} < 20)}"; then
            echo "Coverage ${pct}% is below the 20% threshold"
            exit 1
          fi

      - name: Run tests with race detector
        run: go test -race -count=1 -timeout=60s ./...
