name: Python Tests

on:
  push:
    branches: [prod, dev]
  pull_request:
    branches: [prod, dev]
  merge_group:
  workflow_dispatch:

jobs:
  # ── Job 1: Pure-logic unit tests (no display, no GTK) ─────────────────────
  unit:
    name: Unit Tests (no display)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest and coverage
        run: pip install pytest pytest-cov

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=bootc_installer --cov-report=xml --cov-report=term-missing --cov-fail-under=26

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.xml
          retention-days: 30

  # ── Job 2: GTK integration tests (offscreen backend + compiled resources) ──
  ui:
    name: UI Integration Tests (offscreen GTK)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pytest \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            gir1.2-vte-3.91 \
            blueprint-compiler \
            meson \
            ninja-build \
            libglib2.0-dev \
            desktop-file-utils \
            appstream \
            gettext \
            xvfb
          pip3 install pytest-cov 2>/dev/null || true

      - name: Build GResources (blueprints → .gresource)
        run: |
          meson setup build \
            -Dbuild-fisherman=false \
            --prefix=/tmp/tuna-install
          ninja -C build
          RESOURCE=$(find build -name "bootc-installer.gresource" | head -1)
          echo "TUNA_RESOURCE=${RESOURCE}" >> $GITHUB_ENV
          echo "GResource built at: ${RESOURCE}"

      - name: Run UI integration tests (Xvfb)
        env:
          GTK_A11Y: none
          NO_AT_BRIDGE: "1"
        run: |
          xvfb-run -a python3 -m pytest tests/ui/ -v --tb=short \
            -p no:cacheprovider \
            --cov=bootc_installer --cov-report=xml --cov-report=term-missing --cov-fail-under=0

      - name: Upload UI coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ui
          path: coverage.xml
          retention-days: 30
