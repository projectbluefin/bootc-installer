name: Python Tests

on:
  push:
    branches: [prod, dev]
  pull_request:
    branches: [prod, dev]
  merge_group:
  workflow_dispatch:

jobs:
  # Detect whether this PR only touches documentation — if so, skip tests
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for non-docs changes
        id: filter
        run: |
          # Never skip on direct pushes to dev/prod or merge_group — only skip on PRs
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "docs_only=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.sha }}"
          changed=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "$changed"
          # If every changed file matches a docs pattern, skip tests
          if echo "$changed" | grep -qvE '^(README\.md|AGENTS\.md|CLAUDE\.md|MULTI_VARIANT_BUILD\.md|[^/]+\.md|docs/|\.github/[^/]+\.md)'; then
            echo "docs_only=false" >> $GITHUB_OUTPUT
          else
            echo "docs_only=true" >> $GITHUB_OUTPUT
          fi

  # ── Job 1: Pure-logic unit tests (no display, no GTK) ─────────────────────
  unit:
    name: Unit Tests (no display)
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest and coverage
        run: pip install pytest pytest-cov

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=bootc_installer --cov-report=xml --cov-report=term-missing --cov-fail-under=51

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

  unit-docs-skip:
    name: Unit Tests (no display)
    needs: changes
    if: needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Documentation-only change — unit tests skipped ✓"

  # ── Job 2: GTK integration tests (offscreen backend + compiled resources) ──
  ui:
    name: UI Integration Tests (offscreen GTK)
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pytest \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            gir1.2-vte-3.91 \
            blueprint-compiler \
            meson \
            ninja-build \
            libglib2.0-dev \
            desktop-file-utils \
            appstream \
            gettext \
            xvfb
          pip3 install pytest-cov 2>/dev/null || true

      - name: Build GResources (blueprints → .gresource)
        run: |
          meson setup build \
            -Dbuild-fisherman=false \
            --prefix=/tmp/tuna-install
          ninja -C build
          RESOURCE=$(find build -name "bootc-installer.gresource" | head -1)
          echo "TUNA_RESOURCE=${RESOURCE}" >> $GITHUB_ENV
          echo "GResource built at: ${RESOURCE}"

      - name: Run UI integration tests (Xvfb)
        env:
          GTK_A11Y: none
          NO_AT_BRIDGE: "1"
        run: |
          xvfb-run -a python3 -m pytest tests/ui/ -v --tb=short \
            -p no:cacheprovider \
            --cov=bootc_installer --cov-report=xml --cov-report=term-missing --cov-fail-under=0

      - name: Upload UI coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ui
          path: coverage.xml
          retention-days: 30

  ui-docs-skip:
    name: UI Integration Tests (offscreen GTK)
    needs: changes
    if: needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Documentation-only change — UI tests skipped ✓"
