name: Build Multi-Variant Flatpaks

on:
  push:
    branches:
      - dev
      - prod
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-variants:
    strategy:
      matrix:
        variant:
          - name: gnome
            app_id: org.bootcinstaller.Installer
            manifest: flatpak/org.bootcinstaller.Installer.json
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak \
            flatpak-builder \
            git \
            appstream \
            appstream-util \
            dbus

      - name: Initialize dbus
        run: |
          sudo mkdir -p /run/dbus
          sudo dbus-daemon --system --fork --nopidfile || true
          sleep 1

      - name: Add Flathub remote
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build ${{ matrix.variant.name }} variant
        run: |
          flatpak-builder --force-clean --user --repo=flatpak-repo \
            --install-deps-from=flathub \
            --disable-rofiles-fuse \
            build-dir \
            ${{ matrix.variant.manifest }}

      - name: Export ${{ matrix.variant.name }} bundle
        run: |
          flatpak build-bundle flatpak-repo \
            ${{ matrix.variant.app_id }}.flatpak \
            ${{ matrix.variant.app_id }}

      - name: Determine release tag
        id: release_tag
        run: |
          if [[ "${{ github.ref }}" == "refs/tags/v"* ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ "${{ github.ref }}" == "refs/heads/prod" ]]; then
            TAG="latest-stable"
          else
            TAG="latest-dev"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Build tag: $TAG"

      - name: Create or update release
        if: "!startsWith(github.ref, 'refs/tags/')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Delete old release (ignore errors — may not exist or tag may be protected).
          gh release delete $RELEASE_TAG --yes --cleanup-tag 2>&1 || true
          git push origin :refs/tags/$RELEASE_TAG 2>&1 || true
          # Create or update the release. Use a two-step approach:
          # 1. Try to create. If it fails because tag already exists (protected tag),
          #    fall through to step 2.
          # 2. Ensure the release exists (create it if needed), then upload assets.
          if ! gh release create $RELEASE_TAG \
              --title "Build $RELEASE_TAG" \
              --prerelease \
              --notes "Multi-variant bootc-installer Flatpak build" \
              ${{ matrix.variant.app_id }}.flatpak; then
            echo "gh release create failed — ensuring release exists and uploading asset"
            # Make sure a release exists for the tag (in case tag exists but release doesn't)
            gh release create $RELEASE_TAG \
              --title "Build $RELEASE_TAG" \
              --prerelease \
              --notes "Multi-variant bootc-installer Flatpak build" 2>/dev/null || true
            gh release upload $RELEASE_TAG ${{ matrix.variant.app_id }}.flatpak --clobber
          fi

      - name: Upload Flatpak to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant.app_id }}.flatpak
          path: ${{ matrix.variant.app_id }}.flatpak
          retention-days: 30

  release-summary:
    needs: build-variants
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release summary
        run: |
          echo "## 📦 Flatpak Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built Variants:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GNOME: org.bootcinstaller.Installer" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All variants available in [Releases](../releases)" >> $GITHUB_STEP_SUMMARY
